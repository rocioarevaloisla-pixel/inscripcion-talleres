$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@ejemplo.cl",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();
      if (jsonData.token) {
        pm.collectionVariables.set('token', jsonData.token);
      }
    language: text/javascript
order: 2000
