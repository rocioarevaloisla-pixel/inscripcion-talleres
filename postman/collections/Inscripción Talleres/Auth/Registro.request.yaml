$kind: http-request
url: "{{baseUrl}}/auth/registro"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "nombre": "Usuario Test",
      "email": "test@correo.cl",
      "password": "123456"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
        console.log('Usuario registrado exitosamente');
      }
    language: text/javascript
order: 1000
