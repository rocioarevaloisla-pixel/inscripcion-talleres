$kind: http-request
url: "{{baseUrl}}/talleres"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "nombre": "Taller de Pintura",
      "instructor": "María González",
      "capacidad_maxima": 20,
      "fecha_inicio": "2026-07-01",
      "fecha_fin": "2026-07-03",
      "hora_inicio": "10:00",
      "hora_fin": "13:00",
      "precio": 25000,
      "descripcion": "Aprende técnicas de pintura al óleo"
    }
scripts:
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();
      if (jsonData.id) {
        pm.collectionVariables.set('tallerId', jsonData.id);
      }
    language: text/javascript
order: 1000
